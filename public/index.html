<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OtterWars Territory Game</title>

    <!-- Leaflet -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <!-- Game CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Panel -->
    <div id="panel">

        <h2>🦦 OtterWars</h2>

        <div id="username">
            Player
        </div>

        <div id="status">
            Press Claim Territory to capture land
        </div>

        <button id="claimBtn">
            📍 Claim Territory
        </button>

    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Game -->
    <script src="game.js"></script>

</body>

</html>
